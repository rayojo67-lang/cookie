<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nutella: School</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #0055cc;
    --accent-dark: #003a99;
    --accent-bright: #1a6eff;
    --black: #000000;
    --black-card: #111111;
    --black-card2: #161616;
    --white: #ffffff;
    --gray: #aaaaaa;
    --gray-dim: #555555;
    --font: 'Press Start 2P', cursive;
  }
  html { scroll-behavior: smooth; }
  body { background-color: var(--black); color: var(--white); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 50%, var(--accent-bright) 100%);
    padding: 0 24px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: space-between; height: 70px;
    border-bottom: 2px solid rgba(255,255,255,0.12);
  }
  .logo-wrap { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .logo-icon { width: 38px; height: 38px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .logo-text { color: var(--white); font-size: 0.72rem; text-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .nav-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: 6px; color: var(--white); cursor: pointer; font-family: var(--font); font-size: 0.42rem; padding: 8px 14px; }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }

  /* CREDITS MODAL */
  .credits-modal-bg { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
  .credits-modal-bg.open { display: flex; }
  .credits-modal { background: var(--black-card); border: 2px solid var(--accent); border-radius: 16px; padding: 40px 36px; max-width: 520px; width: 90%; text-align: center; position: relative; }
  .credits-modal h2 { font-size: 0.75rem; color: var(--accent-bright); margin-bottom: 28px; line-height: 2; }
  .credits-modal p { font-size: 0.42rem; color: var(--gray); line-height: 2.4; margin-bottom: 20px; }
  .credits-modal a { color: var(--accent-bright); text-decoration: none; }
  .credits-modal a:hover { text-decoration: underline; }
  .credits-close { margin-top: 10px; background: var(--accent); border: none; border-radius: 8px; color: var(--white); cursor: pointer; font-family: var(--font); font-size: 0.42rem; padding: 10px 22px; }
  .credits-close:hover { background: var(--accent-bright); }
  .credits-star { font-size: 2.2rem; display: block; margin-bottom: 18px; }

  /* HERO */
  .hero { background: linear-gradient(180deg, #00001a 0%, var(--black) 100%); padding: 50px 24px 40px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(0,85,204,0.15) 0%, transparent 70%); pointer-events: none; }
  .hero h1 { font-size: clamp(0.75rem, 2vw, 1.3rem); color: var(--white); margin-bottom: 14px; position: relative; line-height: 1.8; }
  .hero h1 em { color: var(--accent-bright); font-style: normal; }
  .hero p { font-size: 0.48rem; color: var(--gray); max-width: 520px; margin: 0 auto 28px; position: relative; line-height: 2.2; }

  /* SEARCH */
  .search-bar { display: flex; max-width: 460px; margin: 0 auto; }
  .search-bar input { flex: 1; background: var(--black-card2); border: 2px solid var(--gray-dim); border-right: none; border-radius: 8px 0 0 8px; color: var(--white); font-family: var(--font); font-size: 0.48rem; padding: 12px 14px; }
  .search-bar input::placeholder { color: var(--gray-dim); }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  .search-bar button { background: var(--accent); border: none; border-radius: 0 8px 8px 0; color: white; cursor: pointer; font-family: var(--font); font-size: 0.48rem; padding: 12px 16px; }
  .search-bar button:hover { background: var(--accent-bright); }

  /* MAIN */
  main { max-width: 1280px; margin: 0 auto; padding: 36px 24px 60px; }
  .section-title { font-size: 0.62rem; color: var(--white); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #2a2a2a, transparent); }

  /* GAME GRID */
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
  .game-card { background: var(--black-card); border: 2px solid #222; border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; padding-bottom: 10px; }
  .game-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,85,204,0.35); }
  .game-thumb { width: 100%; aspect-ratio: 16/9; background: #00001a; display: flex; align-items: center; justify-content: center; font-size: 2rem; position: relative; }
  .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; opacity: 0; transition: opacity 0.2s; }
  .game-card:hover .play-overlay { opacity: 1; }
  .game-name { font-size: 0.42rem; color: var(--white); text-align: center; padding: 8px 6px 0; line-height: 1.7; }
  .no-results { color: var(--gray-dim); grid-column: 1/-1; text-align: center; padding: 40px 0; font-size: 0.45rem; }

  /* GAME MODAL */
  .game-modal-bg { display: none; position: fixed; inset: 0; z-index: 999; background: #000; flex-direction: column; }
  .game-modal-bg.open { display: flex; }
  .game-modal-header { background: var(--accent-dark); display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; flex-shrink: 0; }
  .game-modal-title { font-size: 0.52rem; color: var(--white); }
  .game-modal-close { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: var(--white); cursor: pointer; font-family: var(--font); font-size: 0.42rem; padding: 6px 12px; }
  .game-modal-close:hover { background: rgba(0,50,150,0.5); }
  .game-modal-fullscreen { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: var(--white); cursor: pointer; font-family: var(--font); font-size: 0.42rem; padding: 6px 12px; }
  .game-modal-fullscreen:hover { background: rgba(0,100,0,0.5); }
  .gameFrame { flex: 1; width: 100%; border: none; display: block; }

  /* FOOTER */
  footer { background: var(--black-card); border-top: 1px solid #222; padding: 28px 24px; text-align: center; }
  .footer-logo { font-size: 0.55rem; color: var(--white); margin-bottom: 10px; }
  .footer-logo span { color: var(--accent-bright); }
  footer p { font-size: 0.35rem; color: var(--gray-dim); line-height: 2; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">🎮</div>
    <div class="logo-text">Nutella: School</div>
  </div>
  <button class="nav-btn" onclick="document.getElementById('creditsModal').classList.add('open')">Credits</button>
</header>

<!-- HOME PAGE -->
<section class="hero">
  <h1>Welcome to <em>Nutella: School</em></h1>
  <p>Search or click a game to play instantly.</p>
  <div class="search-bar">
    <input type="text" id="searchHomeInput" placeholder="Search games…" oninput="searchGames(this.value)" />
    <button onclick="searchGames(document.getElementById('searchHomeInput').value)">Search</button>
  </div>
</section>
<main>
  <div class="section-title">🎮 Games</div>
  <div class="game-grid" id="homeGrid"></div>
</main>

<!-- CREDITS MODAL -->
<div id="creditsModal" class="credits-modal-bg" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="credits-modal">
    <span class="credits-star">🌟</span>
    <h2>Credits</h2>
    <p>All these games aren't mine — they are from <a href="https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/" target="_blank">Ultimate Game Stash</a>.</p>
    <p>Thank you <strong style="color:var(--white)">Ultimate Game Stash</strong> for all these games! 🎮</p>
    <button class="credits-close" onclick="document.getElementById('creditsModal').classList.remove('open')">Close</button>
  </div>
</div>

<!-- GAME MODAL -->
<div id="gameModal" class="game-modal-bg">
  <div class="game-modal-header">
    <div class="game-modal-title" id="gameTitle"></div>
    <div style="display:flex;gap:8px;">
      <button class="game-modal-fullscreen" onclick="fullscreenGame()">⛶ Fullscreen</button>
      <button class="game-modal-close" onclick="closeGame()">✕ Close</button>
    </div>
  </div>
  <iframe id="gameFrame" class="gameFrame" src="" allowfullscreen></iframe>
</div>

<footer>
  <div class="footer-logo"><span>Nutella:</span> School</div>
  <p>© 2025 Nutella: School</p>
</footer>

  function buildGrid(list) {
    const grid = document.getElementById('homeGrid');
    grid.innerHTML = '';
    if (!list.length) { grid.innerHTML = '<p class="no-results">No games found.</p>'; return; }
    list.forEach(g => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const thumbContent = g.img ? `<img src="${g.img}" alt="${g.name}" style="width:100%;height:100%;object-fit:cover;">` : `<span>${g.emoji}</span>`;
      card.innerHTML = `<div class="game-thumb">${thumbContent}<div class="play-overlay">▶</div></div><div class="game-name">${g.name}</div>`;
      card.onclick = () => openGame(g);
      grid.appendChild(card);
    });
  }

  function searchGames(q) {
    const filtered = q.trim() ? games.filter(g => g.name.toLowerCase().includes(q.toLowerCase())) : games;
    buildGrid(filtered);
  }

  let currentBlobUrl = null;

  function openGame(g) {
    document.getElementById('gameTitle').textContent = g.name;
    if (g.html) {
      const blob = new Blob([g.html], { type: 'text/html' });
      currentBlobUrl = URL.createObjectURL(blob);
      document.getElementById('gameFrame').src = currentBlobUrl;
    } else {
      document.getElementById('gameFrame').src = g.url;
    }
    document.getElementById('gameModal').classList.add('open');
  }

  function fullscreenGame() {
    const frame = document.getElementById('gameFrame');
    if (frame.requestFullscreen) frame.requestFullscreen();
    else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
    else if (frame.mozRequestFullScreen) frame.mozRequestFullScreen();
    else if (frame.msRequestFullscreen) frame.msRequestFullscreen();
  }

  function closeGame() {
    document.getElementById('gameFrame').src = '';
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
    document.getElementById('gameModal').classList.remove('open');
  }

  buildGrid(games);
</script>
