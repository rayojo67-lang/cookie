<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nutella: School</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a6bbf;
    --blue-dark: #0d4a8a;
    --blue-bright: #2e8de0;
    --black: #000000;
    --black-card: #111111;
    --white: #ffffff;
    --gray: #aaaaaa;
    --gray-dim: #555555;
    --font: 'Press Start 2P', cursive;
  }
  html { scroll-behavior: smooth; }
  body {
    background-color: var(--black);
    color: var(--white);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 50%, var(--blue-bright) 100%);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(26,107,191,0.6);
    display: flex;
    align-items: center;
    height: 70px;
    border-bottom: 2px solid rgba(255,255,255,0.12);
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: white;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .logo-text {
    color: var(--white);
    font-size: 0.72rem;
    line-height: 1;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .logo-text span {
    opacity: 0.85;
    font-size: 0.55em;
    display: block;
    letter-spacing: 2px;
    margin-top: 6px;
  }
  .game-modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #000;
    flex-direction: column;
  }
  .game-modal-bg.open { display: flex; }
  .game-modal-header {
    background: var(--blue-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    flex-shrink: 0;
  }
  .game-modal-title { font-size: 0.52rem; color: var(--white); }
  .game-modal-close {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: var(--white);
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.42rem;
    padding: 6px 12px;
  }
  .game-modal-close:hover { background: rgba(26,107,191,0.6); }
  .gameFrame { flex: 1; width: 100%; border: none; display: block; }
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }
  .section-title {
    font-size: 0.62rem;
    color: var(--white);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #2a2a2a, transparent);
  }
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }
  .game-card {
    background: #111;
    border: 2px solid #222;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    padding-bottom: 10px;
  }
  .game-card:hover {
    border-color: var(--blue);
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(26,107,191,0.35);
  }
  .game-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #00001a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    position: relative;
  }
  .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .game-card:hover .play-overlay { opacity: 1; }
  .game-name {
    font-size: 0.42rem;
    color: var(--white);
    text-align: center;
    padding: 8px 6px 0;
    line-height: 1.7;
  }
  .search-wrap {
    margin-bottom: 24px;
    display: flex;
    gap: 0;
    max-width: 500px;
  }
  .search-wrap input {
    flex: 1;
    background: #161616;
    border: 2px solid #333;
    border-right: none;
    border-radius: 8px 0 0 8px;
    color: var(--white);
    font-family: var(--font);
    font-size: 0.42rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--gray-dim); }
  .search-wrap input:focus { border-color: var(--blue); }
  .search-wrap button {
    background: var(--blue);
    border: none;
    border-radius: 0 8px 8px 0;
    color: white;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.42rem;
    padding: 11px 16px;
    transition: background 0.2s;
  }
  .search-wrap button:hover { background: var(--blue-bright); }
  .no-results {
    color: #555;
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 0;
    font-size: 0.45rem;
  }
  footer {
    background: var(--black-card);
    border-top: 1px solid #222;
    padding: 28px 24px;
    text-align: center;
  }
  .footer-logo { font-size: 0.55rem; color: var(--white); margin-bottom: 14px; }
  .footer-logo span { color: var(--blue-bright); }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .footer-links a { color: var(--gray); text-decoration: none; font-size: 0.38rem; }
  .footer-links a:hover { color: var(--blue-bright); }
  footer p { font-size: 0.35rem; color: var(--gray-dim); line-height: 2; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="https://1000logos.net/wp-content/uploads/2020/09/Nutella-Logo.png" alt="Nutella Logo" style="height: 48px; width: auto; object-fit: contain;">
    <div class="logo-text">
      : School
    </div>
  </div>
</header>

<div id="gameModal" class="game-modal-bg">
  <div class="game-modal-header">
    <div class="game-modal-title" id="gameTitle"></div>
    <button class="game-modal-close" onclick="closeGame()">✕ Close</button>
  </div>
  <iframe id="gameFrame" class="gameFrame" src="" allowfullscreen></iframe>
</div>

<main>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search games..." oninput="filterGames(this.value)" />
    <button onclick="filterGames(document.getElementById('searchInput').value)">Search</button>
  </div>
  <div class="section-title">🎮 Games</div>
  <div class="game-grid" id="gameGrid"></div>
</main>

<footer>
  <div class="footer-logo"><span>Nutella</span>: School</div>
  <div class="footer-links">
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">Contact</a>
    <a href="#">DMCA</a>
  </div>
  <p>© 2025 Nutella: School · All games are property of their respective owners.</p>
</footer>

      name: "A Dance of Fire and Ice",

      html: `<!DOCTYPE html><html><head><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/paigerodeghero/academicwebsite@897c910c65e6c68b04c44a6b6eba0b99d0f2f2cf/TemplateData/style.css"><script src="https://cdn.jsdelivr.net/gh/paigerodeghero/academicwebsite@897c910c65e6c68b04c44a6b6eba0b99d0f2f2cf/TemplateData/UnityProgress.js"><\/script><script src="https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/UnityLoader.js"><\/script><script>var gameInstance = UnityLoader.instantiate("gameContainer","https://cdn.jsdelivr.net/gh/udbsite/adofai@f170efcb1b532312817e69f26ce3f84c99940238/Build/adofaiii4.json",{onProgress:UnityProgress,Module:{onRuntimeInitialized:function(){UnityProgress(gameInstance,"complete")}}});<\/script><div class="webgl-content"><div id="gameContainer" style="width:100vw;height:100vh"></div></div></html>`,
      emoji: "🔥"
    }

  function buildGrid(list) {
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';
    if (!list.length) {
      grid.innerHTML = '<div class="no-results">No games found.</div>';
      return;
    }
    list.forEach(g => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const thumbContent = g.img
        ? `<img src="${g.img}" alt="${g.name}" style="width:100%;height:100%;object-fit:contain;background:#111;">`
        : `<span>${g.emoji || '🎮'}</span>`;
      card.innerHTML = `
        <div class="game-thumb">
          ${thumbContent}
          <div class="play-overlay">▶</div>
        </div>
        <div class="game-name">${g.name}</div>`;
      card.onclick = () => openGame(g);
      grid.appendChild(card);
    });
  }

  function filterGames(q) {
    const filtered = q.trim()
      ? games.filter(g => g.name.toLowerCase().includes(q.toLowerCase()))
      : games;
    buildGrid(filtered);
  }

  function openGame(g) {
    document.getElementById('gameTitle').textContent = g.name;
    const frame = document.getElementById('gameFrame');
    if (g.embed && g.html) {
      frame.removeAttribute('src');
      frame.srcdoc = g.html;
    } else {
      frame.removeAttribute('srcdoc');
      frame.src = g.url;
    }
    document.getElementById('gameModal').classList.add('open');
  }

  function closeGame() {
    document.getElementById('gameFrame').src = '';
    document.getElementById('gameModal').classList.remove('open');
  }

  window.onload = () => buildGrid(games);
</script>
